<!DOCTYPE html>
<html>
  <head>
    <style>
      table {
        border-collapse: collapse;
      }

      td,
      th {
        border: 1px solid black;
        padding: 3px;
        text-align: center;
      }

      th {
        font-weight: bold;
        background-color: #e6e6e6;
      }
    </style>
  </head>

  <body>
    <div id="calendar"></div>

    <script>
      function createCalendar(elem, year, month) {
        let mon = month - 1; // måneder i JS er 0..11, ikke 1..12
        let d = new Date(year, mon);

        let table = '<table><tr><th>MO</th><th>TU</th><th>WE</th><th>TH</th><th>FR</th><th>SA</th><th>SU</th></tr><tr>';

        // mellemrum for den første række
        // fra mandag til den første dag i måneden
        // * * * 1  2  3  4
        for (let i = 0; i < getDay(d); i++) {
          table += '<td></td>';
        }

        // <td> med faktiske datoer
        while (d.getMonth() == mon) {
          table += '<td>' + d.getDate() + '</td>';

          if (getDay(d) % 7 == 6) {
            // søndag, sidste dag i ugen - ny linje
            table += '</tr><tr>';
          }

          d.setDate(d.getDate() + 1);
        }

        // tilføj mellemrum efter sidste dage i måneden for den sidste række
        // 29 30 31 * * * *
        if (getDay(d) != 0) {
          for (let i = getDay(d); i < 7; i++) {
            table += '<td></td>';
          }
        }

        // luk tabellen
        table += '</tr></table>';

        elem.innerHTML = table;
      }

      function getDay(date) {
        // hent dagens nummer fra 0 (mandag) til 6 (søndag)
        let day = date.getDay();
        if (day == 0) day = 7; // gør søndag (0) til den sidste dag
        return day - 1;
      }

      createCalendar(calendar, 2012, 9);
    </script>
  </body>
</html>
