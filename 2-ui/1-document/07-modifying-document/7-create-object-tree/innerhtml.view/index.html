<!doctype html>
<html>
  <body>
    <div id="container"></div>

    <script>
      let data = {
        Fisk: {
          ørred: {},
          laks: {},
        },

        Træ: {
          Store: {
            mammuttræ: {},
            eg: {},
          },
          Blomstrende: {
            æbletræ: {},
            magnolia: {},
          },
        },
      };

      function createTree(container, obj) {
        container.innerHTML = createTreeText(obj);
      }

      function createTreeText(obj) {
        // selvstændig rekursiv funktion
        let li = '';
        let ul;
        for (let key in obj) {
          li += '<li>' + key + createTreeText(obj[key]) + '</li>';
        }
        if (li) {
          ul = '<ul>' + li + '</ul>';
        }
        return ul || '';
      }

      createTree(container, data);
    </script>
  </body>
</html>
