<!DOCTYPE html>
<html>
  <body>
    <ul>
      <li>
        Dyr
        <ul>
          <li>
            Pattedyr
            <ul>
              <li>Køer</li>
              <li>Aber</li>
              <li>Hunde</li>
              <li>Tigre</li>
            </ul>
          </li>
          <li>
            Andet
            <ul>
              <li>Slanger</li>
              <li>Fugle</li>
              <li>Øgler</li>
            </ul>
          </li>
        </ul>
      </li>
      <li>
        Fisk
        <ul>
          <li>
            Akvarium
            <ul>
              <li>Guppy</li>
              <li>Skalare</li>
            </ul>
          </li>
          <li>
            Havet
            <ul>
              <li>Havørred</li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>

    <script>
      let lis = document.getElementsByTagName('li');

      for (let li of lis) {
        // find antallet af alle <li> under denne <li>
        let descendantsCount = li.getElementsByTagName('li').length;
        if (!descendantsCount) continue;

        // tilføj direkte til textnoden (tilføj til teksten i <li>)
        li.firstChild.data += ' [' + descendantsCount + ']';
      }
    </script>
  </body>
</html>
