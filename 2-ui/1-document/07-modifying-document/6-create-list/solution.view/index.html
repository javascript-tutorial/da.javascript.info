<!DOCTYPE html>
<html>
  <body>
    <h1>Opret en liste</h1>

    <script>
      let ul = document.createElement('ul');
      document.body.append(ul);

      while (true) {
        let data = prompt('Skriv tekst for elementet', '');

        if (!data) {
          break;
        }

        let li = document.createElement('li');
        li.textContent = data;
        ul.append(li);
      }
    </script>
  </body>
</html>
