<!DOCTYPE html>
<html>
  <head>
    <style>
      .hour {
        color: red;
      }

      .min {
        color: green;
      }

      .sec {
        color: blue;
      }
    </style>
  </head>

  <body>
    <div id="clock">
      <span class="hour">tt</span>
      :
      <span class="min">mm</span>
      :
      <span class="sec">ss</span>
    </div>

    <script>
      let timerId;

      function update() {
        let clock = document.getElementById('clock');
        let date = new Date();

        let hours = date.getHours();
        if (hours < 10) hours = '0' + hours;
        clock.children[0].innerHTML = hours;

        let minutes = date.getMinutes();
        if (minutes < 10) minutes = '0' + minutes;
        clock.children[1].innerHTML = minutes;

        let seconds = date.getSeconds();
        if (seconds < 10) seconds = '0' + seconds;
        clock.children[2].innerHTML = seconds;
      }

      function clockStart() {
        // sæt kun et nyt interval hvis uret ikke er startet
        // ellers ville vi overskrive timerID-referencen til det kørende interval og ikke kunne stoppe uret igen
        if (!timerId) {
          timerId = setInterval(update, 1000);
        }
        update(); // <--  start umiddelbart, vent ikke 1 sekund før det første setInterval virker
      }

      function clockStop() {
        clearInterval(timerId);
        timerId = null; // <-- slet timerID for at indikere at uret er stoppet, så det er muligt at starte det igen i clockStart()
      }
    </script>

    <!-- klik på denne knap kalder clockStart() -->
    <input type="button" onclick="clockStart()" value="Start" />

    <!-- klik på denne knap kalder clockStop() -->
    <input type="button" onclick="clockStop()" value="Stop" />
  </body>
</html>
