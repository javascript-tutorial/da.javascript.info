<!DOCTYPE html>
<html>
  <body>
    <ul>
      <li>
        Dyr
        <ul>
          <li>
            Pattedyr
            <ul>
              <li>Køer</li>
              <li>Aber</li>
              <li>Hunde</li>
              <li>Tigre</li>
            </ul>
          </li>
          <li>
            Andet
            <ul>
              <li>Slanger</li>
              <li>Fugle</li>
              <li>Øgler</li>
            </ul>
          </li>
        </ul>
      </li>
      <li>
        Fisk
        <ul>
          <li>
            Akvarium
            <ul>
              <li>Guppy</li>
              <li>Skalare</li>
            </ul>
          </li>
          <li>
            Havet
            <ul>
              <li>Havørred</li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>

    <script>
      for (let li of document.querySelectorAll('li')) {
        // hent titlen fra tekstnoden
        let title = li.firstChild.data;

        title = title.trim(); // fjern ekstra mellemrum rundt om teksten

        // få antallet af efterkommere
        let count = li.getElementsByTagName('li').length;

        alert(title + ': ' + count);
      }
    </script>
  </body>
</html>
