<!DOCTYPE html>
<html>
  <body>
    <form name="search">
      <label>
        Søg på siden:
        <input type="text" name="search" />
      </label>
      <input type="submit" value="Search!" />
    </form>

    <hr />

    <form name="search-person">
      Søg efter besøgende:
      <table id="age-table">
        <tr>
          <td>Alder:</td>
          <td id="age-list">
            <label>
              <input type="radio" name="age" value="young" />
              under 18
            </label>
            <label>
              <input type="radio" name="age" value="mature" />
              18-50
            </label>
            <label>
              <input type="radio" name="age" value="senior" />
              over 50
            </label>
          </td>
        </tr>

        <tr>
          <td>Yderligere:</td>
          <td>
            <input type="text" name="info[0]" />
            <input type="text" name="info[1]" />
            <input type="text" name="info[2]" />
          </td>
        </tr>
      </table>

      <input type="submit" value="Search!" />
    </form>
  </body>
</html>
