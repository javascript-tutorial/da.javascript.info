<script>
  async function* fetchCommits(repo) {
    let url = `https://api.github.com/repos/${repo}/commits`;

    while (url) {
      const response = await fetch(url, {
        headers: {'User-Agent': 'Our script'}, // github kræver en user-agent header
      });

      const body = await response.json(); // oversætter svaret som JSON (array af commits)

      // URL'en for den næste side er i headerne - træk dem ud
      let nextPage = response.headers.get('Link').match(/<(.*?)>; rel="next"/);
      nextPage = nextPage?.[1];

      url = nextPage;

      // yield commits en ad gangen. Når det er færdigt? ... fetch en ny sides url
      for(let commit of body) {
        yield commit;
      }
    }
  }
</script>
